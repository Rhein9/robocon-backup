terrain_analysis:
  ros__parameters:
    use_sim_time: false
    scanVoxelSize: 0.05
    decayTime: 1.0
    noDecayDis: 1.75
    clearingDis: 8.0
    useSorting: true
    quantileZ: 0.25
    considerDrop: false
    limitGroundLift: false
    maxGroundLift: 0.15
    clearDyObs: true
    minDyObsDis: 0.3
    minDyObsAngle: 0.0
    minDyObsRelZ: -0.3
    absDyObsRelZThre: 0.2
    minDyObsVFOV: -28.0
    maxDyObsVFOV: 33.0
    minDyObsPointNum: 1
    noDataObstacle: false
    noDataBlockSkipNum: 0
    minBlockPointNum: 10
    vehicleHeight: 1.5
    voxelPointUpdateThre: 100
    voxelTimeUpdateThre: 2.0
    minRelZ: -1.5
    maxRelZ: 0.3
    disRatioZ: 0.2

goal_pose_bridge:
  ros__parameters:
    use_sim_time: false
    goal_pose_topic: /goal_pose
    action_name: navigate_to_pose

