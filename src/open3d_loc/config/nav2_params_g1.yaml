bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 80.0
    odom_topic: /Odometry_loc
    min_x_velocity_threshold: 0.05
    min_y_velocity_threshold: 0.05
    min_theta_velocity_threshold: 0.1
    failure_tolerance: 1.0
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.5
      movement_time_allowance: 3.0
    general_goal_checker:
      stateful: false
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.3
      yaw_goal_tolerance: 3.14
    FollowPath:
      plugin: nav2_mppi_controller::MPPIController
      time_steps: 180
      model_dt: 0.014
      batch_size: 1500
      vx_std: 0.78
      vy_std: 0.78
      wz_std: 0.1
      vx_max: 1.4
      vx_min: -1.4
      vy_max: 1.4
      wz_max: 0.1
      iteration_count: 1
      prune_distance: 4.0
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.07
      motion_model: Omni
      visualize: false
      reset_period: 1.0
      regenerate_noises: false
      retry_attempt_limit: 3
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      critics: [ObstaclesCritic, GoalCritic, PathAlignCritic, PathFollowCritic, TwirlingCritic]
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.7
      PreferForwardCritic:
        enabled: false
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.7
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 0.2
        critical_weight: 20.0
        consider_footprint: false
        collision_cost: 40.0
        collision_margin_distance: 0.05
        near_goal_distance: 0.1
        inflation_radius: 0.4
        cost_scaling_factor: 10.0
        inflation_layer_name: [local_inflation_layer, global_inflation_layer]
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 20.0
        max_path_occupancy_ratio: 0.001
        trajectory_point_step: 3
        threshold_to_consider: 0.7
        offset_from_furthest: 2
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 10
        threshold_to_consider: 0.7
      PathAngleCritic:
        enabled: false
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      TwirlingCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 20.0
      publish_frequency: 20.0
      global_frame: map
      robot_base_frame: base_link
      rolling_window: true
      width: 7
      height: 7
      resolution: 0.05
      robot_radius: 0.35
      footprint_padding: 0.05
      always_send_full_costmap: true
      plugins: [local_obstacle_layer, local_inflation_layer]
      local_obstacle_layer:
        plugin: costmap_intensity::ObstacleLayerIntensity
        enabled: true
        footprint_clearing_enabled: true
        min_obstacle_intensity: 0.15
        max_obstacle_intensity: 1.8
        observation_sources: pointcloud
        pointcloud:
          topic: /terrain_map
          data_type: PointCloud2
          marking: true
          clearing: true
          obstacle_max_range: 7.0
          obstacle_min_range: 0.15
          raytrace_max_range: 8.0
          raytrace_min_range: 0.1
          max_obstacle_height: 2.0
          min_obstacle_height: -2.0
      local_inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 5.0
        inflation_radius: 0.4

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.10
      robot_radius: 0.35
      footprint_padding: 0.05
      track_unknown_space: true
      always_send_full_costmap: true
      plugins: [static_layer, global_inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_topic: /map
        map_subscribe_transient_local: true
      global_inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 10.0
        inflation_radius: 0.5

map_server:
  ros__parameters:
    use_sim_time: false

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_theta_star_planner/ThetaStarPlanner
      how_many_corners: 8
      w_euc_cost: 1.0
      w_traversal_cost: 2.0
      w_heuristic_cost: 1.0

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: [SmoothPath]
    SmoothPath:
      plugin: nav2_constrained_smoother/ConstrainedSmoother
      reversing_enabled: false
      path_downsampling_factor: 3
      path_upsampling_factor: 1
      keep_start_orientation: false
      keep_goal_orientation: false
      minimum_turning_radius: 0.40
      w_curve: 30.0
      w_dist: 0.0
      w_smooth: 2000000.0
      w_cost: 100.0
      w_cost_cusp_multiplier: 3.0
      cusp_zone_length: 2.5
      optimizer:
        max_iterations: 70
        debug_optimizer: false
        gradient_tol: 5e3
        fn_tol: 1.0e-15
        param_tol: 1.0e-20

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    behavior_plugins: [spin, backup, drive_on_heading, wait, assisted_teleop]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUpTwzFree
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    wait:
      plugin: nav2_behaviors/Wait
    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop
    robot_radius: 0.35
    max_radius: 3.5
    service_name: global_costmap/get_costmap
    free_threshold: 3
    visualization: true

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 0

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 80.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [1.2, 1.2, 1.0]
    min_velocity: [-1.2, -1.2, -1.0]
    max_accel: [3.0, 3.0, 1.0]
    max_decel: [-3.0, -3.0, -1.0]
    deadband_velocity: [0.05, 0.05, 0.05]
    velocity_timeout: 1.0
    odom_topic: /Odometry_loc

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true
